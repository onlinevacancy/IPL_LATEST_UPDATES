<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&amp;w=1920') no-repeat center/cover;
  overflow:hidden;
}

/* DARK OVERLAY */
body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
  backdrop-filter: blur(6px);
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  width:92%;
  max-width:380px;
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  text-align:center;
  color:#fff;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* TELEGRAM HEADER */
.logo{
  font-weight:700;
  font-size:20px;
  margin-bottom:15px;
}

/* PROFILE */
.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #229ED9;
  margin-bottom:10px;
  animation:zoom 1s ease;
}

@keyframes zoom{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.title{
  font-size:22px;
  font-weight:700;
}

.sub{
  font-size:14px;
  opacity:0.7;
  margin-bottom:8px;
}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-bottom:15px;
}

/* TIMER */
.timer{
  font-size:15px;
  color:#ffcc00;
  margin-bottom:15px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#229ED9;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#1a8acb;
}

/* DISCLAIMER */
.disclaimer{
  font-size:11px;
  opacity:0.6;
  margin-top:15px;
}
</style>
